<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f0f2f5;
    padding: 20px;
    min-height: 100vh;
  }

  .editor-container {
    max-width: 900px;
    margin: 0 auto;
  }

  .editor-label {
    font-size: 13px;
    color: #666;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .editor-label .mode-toggle {
    font-size: 12px;
    color: #888;
    cursor: pointer;
    user-select: none;
    padding: 2px 8px;
    border: 1px solid #ccc;
    border-radius: 3px;
    background: #fff;
  }

  .editor-label .mode-toggle:hover {
    background: #e8e8e8;
  }

  .editor {
    background: #fff;
    border: 1px solid #ccc;
    border-radius: 4px;
    min-height: 400px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    outline: none;
    overflow-y: auto;
    max-height: 80vh;
    transition: border-color 0.15s;
  }

  .editor:focus {
    border-color: #4a9eff;
    box-shadow: 0 0 0 2px rgba(74, 158, 255, 0.15);
  }

  .editor[data-placeholder]:empty::before {
    content: attr(data-placeholder);
    color: #aaa;
    pointer-events: none;
  }

  /* Ensure pasted tables look decent */
  .editor table {
    border-collapse: collapse;
    margin: 8px 0;
    width: auto;
  }

  .editor td, .editor th {
    padding: 4px 8px;
    vertical-align: top;
  }

  .editor img {
    max-width: 100%;
    height: auto;
  }

  /* Source view */
  .source-view {
    display: none;
    background: #1e1e1e;
    color: #d4d4d4;
    border: 1px solid #ccc;
    border-radius: 4px;
    min-height: 400px;
    max-height: 80vh;
    padding: 16px;
    font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    outline: none;
    overflow-y: auto;
    resize: vertical;
  }
</style>
</head>
<body>

<div class="editor-container">
  <div class="editor-label">
    <span>Paste from Word, Google Docs, or type directly</span>
    <button class="mode-toggle" id="modeToggle" title="Toggle HTML source view">View Source</button>
  </div>
  <div class="editor" id="editor" contenteditable="true"
       data-placeholder="Paste content here or start typing..."></div>
  <textarea class="source-view" id="sourceView"></textarea>
</div>

<script src="word-cleaner.js"></script>
<script src="editor.js"></script>
</body>
</html>
